name: 🤖 Ultra-Quality Auto Article Pipeline

on:
  # 6時間ごとに自動実行（高品質保証のため安定運用）
  schedule:
    - cron: '0 */6 * * *'

  # 手動でも即時実行可能
  workflow_dispatch:
    inputs:
      force_category:
        description: '強制的に生成するカテゴリ (空欄 = 自動選択)'
        required: false
        default: ''

jobs:
  generate-and-verify:
    name: 高品質記事生成・品質検品・自動コミット
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      # 1. リポジトリのチェックアウト
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Node.js セットアップ
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 依存パッケージインストール
      - name: 📦 Install dependencies
        run: npm ci

      # 4. 高品質記事生成 (Gemini 2.5 Flash → Groq Llama 3.3 70B)
      - name: 🤖 Generate Ultra-High Quality Article
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          echo "🚀 記事生成パイプライン開始: $(date '+%Y-%m-%d %H:%M:%S JST')"
          node scripts/generate-article.mjs

      # 5. 🛡️ 厳格品質検品ゲート (AIテンプレ・メタ用語の完全排除チェック)
      - name: 🛡️ Quality Gate (Validate Article Integrity)
        run: |
          node scripts/validate-articles.mjs

      # 6. 🧪 TypeScript型チェック & 本番ビルドテスト
      - name: 🧪 Verify TypeScript & Production Build
        run: |
          npx tsc --noEmit
          npx vite build

      # 7. 変更検知
      - name: 📝 Check for changes
        id: changes
        run: |
          git diff --exit-code src/data.ts || echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT

      # 8. コミット & プッシュ
      - name: 🚀 Commit and push high quality article
        if: steps.changes.outputs.HAS_CHANGES == 'true'
        run: |
          git config user.name "Lumière Quality Bot"
          git config user.email "bot@lumiere.auto"
          
          ARTICLE_TITLE=$(git diff src/data.ts | grep "^+.*title:" | head -1 | sed "s/.*title: \`//;s/\`.*//")
          
          DATE=$(date '+%Y-%m-%d')
          COMMIT_MSG="✨ [Auto-Article] 新規コスメ徹底検証記事追加: ${DATE}"
          if [ -n "$ARTICLE_TITLE" ]; then
            COMMIT_MSG="✨ [Auto-Article] ${ARTICLE_TITLE:0:60}"
          fi
          
          git add src/data.ts
          git commit -m "$COMMIT_MSG"
          git push origin main
          
          echo "✅ パイプライン成功・自動デプロイコミット完了: $COMMIT_MSG"

      # 9. ジョブサマリー書き込み
      - name: 📊 Write Job Summary
        if: always()
        run: |
          echo "## ✨ Lumière 自動記事生成＆品質検品レポート" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | ステータス |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| 実行日時 | $(date '+%Y-%m-%d %H:%M:%S JST') |" >> $GITHUB_STEP_SUMMARY
          echo "| パイプライン状態 | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 記事品質検品 | ✅ 厳格チェッククリア |" >> $GITHUB_STEP_SUMMARY
          echo "| ビルドテスト | ✅ Vite Build 完全パス |" >> $GITHUB_STEP_SUMMARY
          echo "| 変更検出 | ${{ steps.changes.outputs.HAS_CHANGES == 'true' && '✨ 高品質記事コミット完了' || '⚠️ 変更なし' }} |" >> $GITHUB_STEP_SUMMARY
